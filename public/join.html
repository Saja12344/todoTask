<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join ORBIT Challenge</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #12203a 0%, #060810 55%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      width: min(420px, 100%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 28px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
    }
    h1 { font-size: 1.6rem; margin: 0 0 8px; }
    p { color: rgba(255,255,255,0.72); line-height: 1.5; }
    .code {
      display: inline-block;
      margin: 16px 0;
      padding: 12px 16px;
      border-radius: 14px;
      background: rgba(0,0,0,0.35);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.95rem;
      word-break: break-all;
    }
    button {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #2dd4bf, #0891b2);
      cursor: pointer;
    }
    .hint { font-size: 0.85rem; margin-top: 14px; color: rgba(255,255,255,0.55); }
  </style>
</head>
<body>
  <div class="card">
    <h1>⚡ ORBIT Challenge</h1>
    <p id="subtitle">Opening the app…</p>
    <div class="code" id="code"></div>
    <button type="button" id="openBtn">Open ORBIT</button>
    <p class="hint">If the app doesn’t open, copy the code and join from Friends → Join with Code.</p>
  </div>
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id") || "";
    const from = params.get("from") || "";
    const deepLink = "todoTask://challenge?id=" + encodeURIComponent(id) + "&from=" + encodeURIComponent(from);

    document.getElementById("code").textContent = id || "—";
    document.getElementById("subtitle").textContent = from
      ? from + " challenged you on ORBIT!"
      : "Join the challenge on ORBIT";

    function openApp() {
      window.location.href = deepLink;
    }

    document.getElementById("openBtn").addEventListener("click", openApp);
    openApp();
  </script>
</body>
</html>
